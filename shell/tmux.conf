# Delightful — tmux Configuration
# ================================
# Rainbow powerline status bar matching the Delightful Starship prompt.
# Requires a Nerd Font (recommended: JetBrains Mono Nerd Font).

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on

# --- Terminal Titles (Ghostty tab bar) ---
set -g set-titles on
set -g set-titles-string "#S — #{?#{m/r:^[0-9]+\\.[0-9]+,#{pane_current_command}},#{pane_title},#{?#{m:claude,#{pane_current_command}},#{pane_title},#{?#{m/r:^(zsh|bash|fish)$,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}}}"

# --- Window Naming ---
setw -g automatic-rename on
setw -g automatic-rename-format "#{?pane_in_mode,[tmux],#{?#{m/r:^[0-9]+\\.[0-9]+,#{pane_current_command}},#{pane_title},#{?#{m/r:^(zsh|bash|fish)$,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}}}#{?pane_dead,[dead],}"

# --- Vi Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Keybinds ---
bind | split-window -h -c "#{pane_current_path}" \; select-layout -E
bind - split-window -v -c "#{pane_current_path}" \; select-layout -E
bind x kill-pane \; select-layout -E
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Delightful Status Bar ---
# Palette (matching starship/starship.toml delightful_dark):
#   pink #ff4fa8   gold #f5c526   cyan #5cb8d6
#   gray #615d58   dark #3c3632   text #eee9e3   bg #1e1a16

set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1a16"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name (pink)
set -g status-left "#[bg=#ff4fa8,fg=#eee9e3,bold]  #S #[fg=#ff4fa8,bg=#1e1a16]"

# Windows: current = gold, others = gray
setw -g window-status-format "#[fg=#1e1a16,bg=#615d58]#[fg=#eee9e3,bg=#615d58] #W #[fg=#615d58,bg=#1e1a16]"
setw -g window-status-current-format "#[fg=#1e1a16,bg=#f5c526]#[fg=#1e1a16,bg=#f5c526,bold] #W #[fg=#f5c526,bg=#1e1a16]"
setw -g window-status-separator ""

# Right: hostname (cyan) | date (gray) | time (dark)
set -g status-right "#[fg=#5cb8d6,bg=#1e1a16]#[fg=#eee9e3,bg=#5cb8d6,bold]  #h #[fg=#615d58,bg=#5cb8d6]#[fg=#eee9e3,bg=#615d58]  %b %d #[fg=#3c3632,bg=#615d58]#[fg=#eee9e3,bg=#3c3632]  %H:%M "

# Pane borders
set -g pane-border-style "fg=#615d58"
set -g pane-active-border-style "fg=#ff4fa8"

# Messages
set -g message-style "bg=#f5c526,fg=#1e1a16,bold"
set -g message-command-style "bg=#5cb8d6,fg=#eee9e3"

# Clock
setw -g clock-mode-colour "#ff4fa8"

# --- Plugins (via TPM) ---
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I (Ctrl+b, Shift+i) to install plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
