# Delightful — tmux Configuration
# ================================
# Rainbow powerline status bar matching the Delightful Starship prompt.
# Requires a Nerd Font (recommended: JetBrains Mono Nerd Font).

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on

# --- Vi Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Keybinds ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Delightful Status Bar ---
# Palette (matching starship/starship.toml delightful_dark):
#   pink #f600a3   gold #febf00   cyan #00a6c0
#   gray #615d58   dark #3c3632   text #fdf8f3   bg #1e1a16

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1a16"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name (pink)
set -g status-left "#[bg=#f600a3,fg=#fdf8f3,bold]  #S #[fg=#f600a3,bg=#1e1a16]"

# Windows: current = gold, others = gray
setw -g window-status-format "#[fg=#1e1a16,bg=#615d58]#[fg=#fdf8f3,bg=#615d58] #I #W #[fg=#615d58,bg=#1e1a16]"
setw -g window-status-current-format "#[fg=#1e1a16,bg=#febf00]#[fg=#1e1a16,bg=#febf00,bold] #I #W #[fg=#febf00,bg=#1e1a16]"
setw -g window-status-separator ""

# Right: hostname (cyan) | date (gray) | time (dark)
set -g status-right "#[fg=#00a6c0,bg=#1e1a16]#[fg=#fdf8f3,bg=#00a6c0,bold]  #h #[fg=#615d58,bg=#00a6c0]#[fg=#fdf8f3,bg=#615d58]  %b %d #[fg=#3c3632,bg=#615d58]#[fg=#fdf8f3,bg=#3c3632]  %H:%M "

# Pane borders
set -g pane-border-style "fg=#615d58"
set -g pane-active-border-style "fg=#f600a3"

# Messages
set -g message-style "bg=#febf00,fg=#1e1a16,bold"
set -g message-command-style "bg=#00a6c0,fg=#fdf8f3"

# Clock
setw -g clock-mode-colour "#f600a3"

# --- Plugins (via TPM) ---
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I (Ctrl+b, Shift+i) to install plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
