<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 256px;
    height: 256px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    overflow: hidden;
  }
  .icon {
    width: 224px;
    height: 224px;
    background: #fdf8f3;
    border: 3px solid #1b150f;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 6px 6px 0 #1b150f;
  }
  .letter {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    font-size: 140px;
    font-weight: 800;
    color: #f500a2;
    line-height: 1;
    margin-top: -4px;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="icon">
    <div class="letter">D</div>
  </div>
</body>
</html>
